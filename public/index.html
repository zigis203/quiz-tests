<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="style" href="style.css">
    <script type="text/javascript" src="validation.js" defer></script>
    <title>Sign in</title>
</head>
<body>
    <div class="sign_in">
    <h1>Sign in<h1>
        <p id="error_message"></p>
        <form id="form">
            <div>
                <img src="images/person.png" alt="person" height="25px" width="25px">
                <input required type="text" name="username" id="username_id" placeholder="username">
            </div>
            <div>
                <img src="images/@.svg" alt="person" height="25px" width="25px">
                <input required type="email" name="email" id="email_input" placeholder="email">
            </div>
            <div>
                <img src="images/password.png" alt="person" height="25px" width="25px">
                <input required type="password" name="password" id="password_input" placeholder="Password">
            </div>
            <div>
                <img src="images/password.png" alt="person" height="25px" width="25px">
                <input required type="password" name="repeat-password" id="repeat_password_input" placeholder="Repeat Password">
            </div>
            <button type="submit">Sign up</button>
            <p>Already have an acount? <a href="login.html">Login</a></p>
        </form>
    </div>
</body>
</html>
